# Database configuration (overrides)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
hibernate.dialect=org.hibernate.dialect.H2Dialect

# Test-specific paths
hibernate.search.index.directory=./target/lucene-test-indexes

# Test-specific secrets
jwt.secret=test-secret-key-for-jwt-generation

# Reduce test logging noise
logging.level.root=ERROR
logging.level.org.springframework=OFF
logging.level.org.hibernate=OFF
# Keep your application logs
logging.level.com.hackertracker=INFO
hibernate.show_sql=false
hibernate.format_sql=false

# Optional: More verbose logging for tests
#logging.level.org.springframework.security=DEBUG
#logging.level.com.hackertracker=DEBUG

# All other properties will be inherited from application.properties