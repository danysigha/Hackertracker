spring.application.name=security
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.search=WARN
logging.level.org.flywaydb=WARN
logging.level.com.hackertracker=INFO

jwt.secret=${JWT_SECRET:dev-secret-key}

# Hibernate Search
hibernate.search.index.directory=./hibernate-search-indexes
hibernate.search.backend.analysis.configurer=com.hackertracker.config.MyLuceneAnalysisConfigurer

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hackertracker_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.hbm2ddl.auto=none
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.validateOnMigrate=true

# Seed data
app.seed-data.enabled=true
app.seed-data.file=classpath:data/leetcode_problems.json